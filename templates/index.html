<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SlideAI — AI Presentation Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a38;
  --accent:#7c6fff;--accent2:#a78bfa;--accent3:#06b6d4;
  --text:#f0f0ff;--muted:#8b8ba8;--subtle:#4a4a6a;
  --success:#10b981;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* (ALL YOUR ORIGINAL CSS UNCHANGED — trimmed here for clarity) */
/* KEEP EVERYTHING SAME AS YOUR ORIGINAL FILE */

</style>
</head>
<body>

<!-- KEEP YOUR NAV + HERO + FORM SAME -->

<div class="main-card">

  <!-- KEEP FORM SAME -->

  <div class="result-section" id="result-section">
    <div class="result-header">
      <div class="result-icon">✓</div>
      <div>
        <div class="result-title" id="res-title">Presentation ready</div>
        <div class="result-sub" id="res-sub">Click any slide to preview its content</div>
      </div>
    </div>

    <!-- 🔥 NEW IMAGE PREVIEW -->
    <div id="img-preview" style="display:none;margin-bottom:1.2rem;border-radius:12px;overflow:hidden;border:1px solid var(--border);position:relative;">
      <img id="gen-image" src="" alt="AI generated" style="width:100%;height:200px;object-fit:cover;display:block;"/>
      <div style="position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,0.6);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;">
        AI generated image
      </div>
    </div>

    <div class="slide-chips" id="slide-chips"></div>

    <div class="slide-detail" id="slide-detail">
      <div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0">
        Select a slide above to preview
      </div>
    </div>

    <a class="dl-btn" id="dl-btn">↓ &nbsp;Download PowerPoint (.pptx)</a>
  </div>
</div>

<script>
let selectedTheme = 'elegant';
let lastSlides = [];

function pickTheme(el) {
  document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedTheme = el.dataset.theme;
}

function showChip(idx) {
  const s = lastSlides[idx];
  document.getElementById('slide-detail').innerHTML =
    '<h4>' + s.heading + '</h4><ul>' + s.bullets.map(b => '<li>' + b + '</li>').join('') + '</ul>';
}

async function generate() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) return alert("Enter topic");

  const payload = {
    topic: topic,
    extra: document.getElementById('extra').value,
    num_slides: parseInt(document.getElementById('slides').value),
    theme: selectedTheme
  };

  const res = await fetch('http://localhost:5000/generate', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });

  const blob = await res.blob();
  const dlUrl = URL.createObjectURL(blob);

  const pr = await fetch('http://localhost:5000/last_preview');
  const data = await pr.json();

  lastSlides = data.slides || [];

  // 🔥 IMAGE PREVIEW LOGIC
  if (data.image_url) {
    document.getElementById('gen-image').src = data.image_url;
    document.getElementById('img-preview').style.display = 'block';
  }

  document.getElementById('slide-chips').innerHTML =
    lastSlides.map((s,i)=>`<div class="chip" onclick="showChip(${i})">Slide ${i+1}</div>`).join('');

  const dl = document.getElementById('dl-btn');
  dl.href = dlUrl;
  dl.download = topic + ".pptx";
  dl.style.display = 'flex';

  document.getElementById('result-section').style.display = 'block';
}
</script>

</body>
</html>
