<!DOCTYPE html>
<html>
<head>
    <title>AI PPT Generator</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding-top: 100px;
        }
        h1 {
            font-size: 40px;
        }
        input {
            padding: 12px;
            width: 300px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            color: black;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }
        button:hover {
            background: #00aaff;
        }
    </style>
</head>

<body>

    <h1>🚀 AI PPT Generator</h1>
    <p>Enter any topic and generate your presentation instantly</p>

    <form action="/generate">
        <input type="text" name="topic" placeholder="Enter topic..." required>
        <button type="submit">Generate PPT</button>
    </form>

</body>
</html>
